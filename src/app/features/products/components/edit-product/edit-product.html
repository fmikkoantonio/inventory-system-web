<app-layout>
  <div
    class="p-4 md:p-6 min-h-screen bg-slate-100 dark:bg-slate-950 transition-colors duration-300"
  >
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold text-slate-800 dark:text-slate-100">
          Edit Product
        </h1>

        <p class="mt-1 text-slate-500 dark:text-slate-400">Update product information</p>
      </div>

      <p-button
        label="Back to Products"
        icon="pi pi-arrow-left"
        severity="secondary"
        routerLink="/products"
      />
    </div>

    <!-- Form Card -->
    <div
      class="max-w-4xl mx-auto bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm p-6"
    >
      <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Name -->
        <div>
          <label class="block mb-2 font-medium"> Product Name </label>

          <input
            pInputText
            formControlName="name"
            placeholder="Enter product name"
            class="w-full"
          />
        </div>

        <!-- SKU -->
        <div>
          <label class="block mb-2 font-medium"> SKU </label>

          <input pInputText formControlName="sku" placeholder="Enter SKU" class="w-full" />
        </div>

        <!-- Description -->
        <div>
          <label class="block mb-2 font-medium"> Description </label>

          <textarea
            pTextarea
            rows="4"
            formControlName="description"
            placeholder="Product description"
            class="w-full"
          ></textarea>
        </div>

        <!-- Price -->
        <div>
          <label class="block mb-2 font-medium"> Price </label>

          <p-inputNumber
            formControlName="price"
            mode="currency"
            currency="PHP"
            locale="en-PH"
            styleClass="w-full"
          />
        </div>

        <!-- Category -->
        <div>
          <label class="block mb-2 font-medium"> Category </label>

          <p-select
            formControlName="category"
            [options]="categories"
            optionLabel="name"
            optionValue="_id"
            placeholder="Select Category"
            class="w-full"
          />
        </div>

        <!-- Upload -->
        <div>
          <label class="block mb-2 font-medium"> Product Image </label>

          <input
            type="file"
            accept="image/*"
            (change)="onFileSelected($event)"
            class="block w-full text-sm file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-blue-500 file:text-white hover:file:bg-blue-600"
          />
        </div>

        <!-- Preview -->
        @if (imagePreview || currentImage) {
          <div>
            <label class="block mb-2 font-medium"> Image Preview </label>

            <img
              [src]="imagePreview || currentImage"
              alt="Preview"
              class="w-40 h-40 object-cover rounded-xl border"
            />
          </div>
        }

        <!-- Actions -->
        <div class="flex flex-col sm:flex-row justify-end gap-3 pt-4">
          <p-button label="Cancel" icon="pi pi-times" severity="secondary" routerLink="/products" />

          <p-button
            label="Update Product"
            icon="pi pi-save"
            severity="success"
            type="submit"
            [loading]="isLoading"
          />
        </div>
      </form>
    </div>
  </div>
</app-layout>
