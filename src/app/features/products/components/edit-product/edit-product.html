<div class="max-w-2xl mx-auto p-6">
  <h1 class="text-3xl font-bold mb-6">Edit Product</h1>

  <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="space-y-4">
    <input
      type="text"
      formControlName="name"
      placeholder="Product Name"
      class="w-full border p-2 rounded"
    />

    <input type="text" formControlName="sku" placeholder="SKU" class="w-full border p-2 rounded" />

    <textarea
      formControlName="description"
      placeholder="Description"
      class="w-full border p-2 rounded"
    ></textarea>

    <input
      type="number"
      formControlName="price"
      placeholder="Price"
      class="w-full border p-2 rounded"
    />

    <select formControlName="category" class="w-full border p-2 rounded">
      <option value="">Select Category</option>

      @for (category of categories; track category._id) {
        <option [value]="category._id">
          {{ category.name }}
        </option>
      }
    </select>

    <input type="file" (change)="onFileSelected($event)" class="w-full" />

    <button type="submit" class="bg-black text-white px-4 py-2 rounded">Update Product</button>
  </form>
</div>
