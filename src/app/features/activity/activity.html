<app-layout>
  <div
    class="p-4 md:p-6 min-h-screen bg-slate-100 dark:bg-slate-950 transition-colors duration-300"
  >
    <!-- Header -->
    <div class="mb-6">
      <h1 class="text-2xl md:text-3xl font-bold text-slate-800 dark:text-slate-100">
        Activity Logs
      </h1>

      <p class="mt-1 text-slate-500 dark:text-slate-400">
        Track inventory transactions and user actions
      </p>
    </div>

    <!-- Activity Table -->
    <div
      class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl overflow-hidden shadow-sm"
    >
      <p-table
        [value]="logs"
        responsiveLayout="scroll"
        [stripedRows]="true"
        styleClass="p-datatable-sm"
      >
        <ng-template pTemplate="header">
          <tr>
            <th>Date</th>
            <th>User</th>
            <th>Action</th>
            <th>Product</th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-log>
          <tr>
            <td>
              {{ log.createdAt | date: 'MMM d, y h:mm a' }}
            </td>

            <td>
              <span class="font-medium">
                {{ log.user?.name || 'Unknown User' }}
              </span>
            </td>

            <td>
              <p-tag
                [value]="log.action"
                [severity]="
                  log.action === 'STOCK_IN'
                    ? 'success'
                    : log.action === 'STOCK_OUT'
                      ? 'warn'
                      : log.action === 'DELETE_PRODUCT'
                        ? 'danger'
                        : 'info'
                "
              />
            </td>

            <td>
              {{ log.product?.name || '-' }}
            </td>
          </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="4">
              <div class="text-center py-10 text-slate-500">No activity logs found</div>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>
</app-layout>
