<div
  class="min-h-screen flex items-center justify-center p-4 bg-slate-100 dark:bg-slate-950 transition-colors duration-300"
>
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-slate-800 dark:text-slate-100">Inventory System</h1>

      <p class="mt-2 text-slate-500 dark:text-slate-400">Inventory Management Dashboard</p>
    </div>

    <div
      class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-xl p-8"
    >
      <div class="flex justify-end mb-4">
        <button
          (click)="themeService.toggle()"
          class="px-3 py-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200"
        >
          {{ themeService.isDark() ? '☀️' : '🌙' }}
        </button>
      </div>

      <h2 class="text-2xl font-semibold text-center mb-2 text-slate-800 dark:text-slate-100">
        Create Account
      </h2>

      <p class="text-center mb-6 text-slate-500 dark:text-slate-400">
        Register to start managing inventory
      </p>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label class="block mb-2 text-sm font-medium text-slate-700 dark:text-slate-300">
            Full Name
          </label>

          <input
            pInputText
            formControlName="name"
            placeholder="Enter your full name"
            class="w-full"
          />
        </div>

        <div>
          <label class="block mb-2 text-sm font-medium text-slate-700 dark:text-slate-300">
            Email
          </label>

          <input
            pInputText
            type="email"
            formControlName="email"
            placeholder="Enter your email"
            class="w-full"
          />
        </div>

        <div>
          <label class="block mb-2 text-sm font-medium text-slate-700 dark:text-slate-300">
            Password
          </label>

          <p-password
            formControlName="password"
            [toggleMask]="true"
            [feedback]="false"
            placeholder="Enter your password"
            styleClass="w-full"
            inputStyleClass="w-full"
          />
        </div>

        <p-button type="submit" label="Create Account" styleClass="w-full" [loading]="isLoading" />

        <p-button
          type="button"
          label="Back to Login"
          severity="secondary"
          styleClass="w-full"
          (onClick)="onLogin()"
        />
      </form>
    </div>
  </div>
</div>
