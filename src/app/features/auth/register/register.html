<div class="min-h-screen flex items-center justify-center">
  <form
    [formGroup]="registerForm"
    (ngSubmit)="onSubmit()"
    class="w-full max-w-md space-y-4 p-6 border rounded"
  >
    <h1 class="text-2xl font-bold">Register</h1>

    <input
      type="text"
      formControlName="name"
      placeholder="Name"
      class="w-full border p-2 rounded"
    />

    <input
      type="email"
      formControlName="email"
      placeholder="Email"
      class="w-full border p-2 rounded"
    />

    <input
      type="password"
      formControlName="password"
      placeholder="Password"
      class="w-full border p-2 rounded"
    />

    <button type="submit" class="w-full bg-black text-white p-2 rounded">Register</button>
    <button type="button" class="w-full bg-gray-500 text-white p-2 rounded" (click)="onLogin()">
      Login
    </button>
  </form>
</div>
